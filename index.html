<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>GHOST-DRAW | Spatial Canvas</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>
<body>
    <div class="toolbar">
        <div class="tool-section">
            <label>COULEURS</label>
            <div class="color-picker">
                <div class="color-swatch active" style="background: #00f2ff;" data-color="#00f2ff"></div>
                <div class="color-swatch" style="background: #ff00ff;" data-color="#ff00ff"></div>
                <div class="color-swatch" style="background: #00ff00;" data-color="#00ff00"></div>
                <div class="color-swatch" style="background: #ffffff;" data-color="#ffffff"></div>
            </div>
        </div>
        <div class="tool-section">
            <button id="clear-btn">TOUT EFFACER</button>
        </div>
        <div class="status">MODE: <span id="current-mode">NAVIGATION</span></div>
    </div>

    <video id="input_video" style="display:none"></video>
    <canvas id="output_canvas"></canvas> <canvas id="drawing_canvas"></canvas> <script src="app.js"></script>
</body>
</html>
